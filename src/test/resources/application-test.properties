# Test configuration for ChatService tests

# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# HuggingFace API (mocked in tests)
huggingface.api.url=http://localhost:8080/mock
huggingface.api.key=test-key
huggingface.api.model=test-model
huggingface.api.temperature=0.3
huggingface.api.max-tokens=2048
huggingface.api.retry-attempts=3
huggingface.api.retry-delays=1000,2000,4000

# Logging
logging.level.com.codewiki=DEBUG
