# Server Configuration
server.port=8080

# H2 Database Configuration (File-based for persistence)
spring.datasource.url=jdbc:h2:file:./data/codewiki;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging Configuration
logging.level.root=INFO
logging.level.com.codewiki=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# HuggingFace API Configuration
huggingface.api.url=https://api-inference.huggingface.co/models
huggingface.api.key=${HUGGINGFACE_API_KEY:}
huggingface.api.model=Qwen/Qwen2.5-Coder-7B-Instruct
huggingface.api.temperature=0.3
huggingface.api.max-tokens=2048
huggingface.api.retry-attempts=3
huggingface.api.retry-delays=1000,2000,4000

# Repository Configuration
repository.clone.base-path=./repos
repository.max-size-mb=10

# Rate Limiting Configuration
rate-limit.concurrent-generations=10
rate-limit.llm-requests-per-minute=100

# Repository Monitoring
repository.monitor.cron=0 0 0 * * ?

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
